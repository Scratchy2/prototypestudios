      @keyframes appear {
        0% {scale:0;}
        50% {scale:1.07;}
        100% {scale:1;}
      }
      @keyframes shake {
        0% {translate: 0 0;}
        20% {translate: var(--shake) var(--shake);}
        40% {translate: var(--shake) calc(-1*var(--shake));}
        60% {translate: calc(-1*var(--shake)) var(--shake);}
        80% {translate: calc(-1*var(--shake)) calc(-1*var(--shake));}
      }
      #color {
        width: 8em;
        height: 8em;
        background-color: #fafa00;
        border-radius: 13px;
      }
      #color2 {
        width: 40%;
        font-size: 1.5em;
        margin-bottom: 1.2em;
      }
      #roll {
        width: 10.0695625em;
        height: 4.5em;
      }
      #chroma, #percentile {
        transition: all 749.8375ms ease;
        width: fit-content;
      }
      #chroma {
        --shake: 0px;
        animation: shake 0.15s infinite;
      }
      .name {
        font-size: 1.5em;
      }
      
      .prop {
        width: 70%;
        max-width: 50rem;
        padding: 0.7em;
        border-radius: 20px;
        margin: 1em;
        transition: scale 0.3s ease;
        animation: appear 0.5s;
      }
      .prop:hover {
        scale: 1.042;
      }
      .prop:active {
        scale: 0.99;
      }
      .prop.common {
        background: linear-gradient(to bottom, #606468, #404244);
        border: 4px solid #999;
      }
      .prop.uncommon {
        background: linear-gradient(to bottom, #060, #040);
        border: 4px solid #090;
      }
      .prop.rare {
        background: linear-gradient(to bottom, #006, #004);
        border: 4px solid #009;
      }
      .prop.epic {
        background: linear-gradient(to bottom, #306, #204);
        border: 4px solid #409;
      }
      .prop.legendary {
        background: linear-gradient(to bottom, #660, #440);
        border: 4px solid #990;
      }
      .prop.mythic {
        background: linear-gradient(to bottom, #600, #400);
        border: 4px solid #900;
      }
      
      .value {
        border-radius: 999px;
        margin-top: 0.3em;
        transition: scale 0.25s ease;
      }
      .value:hover {
        scale: 1.042;
      }
      .value:active {

      }
      .value.common { /* 10-999 Chroma */

      .value.uncommon { /* 1 000-9 999 Chroma */
        box-shadow: 0 0 50px 7px #0a0;

      .value.rare { /* 10 000-99 999 Chroma */

      }
      .value.epic { /* 100 000-999 999 Chroma */

      }
      .value.legendary { /* 1 000 000-9 999 999 Chroma */
        box-shadow: 0 0 50px 23px #aa0;
        background-color: #aa0;
      }
      .value.mythic { /* 10 000 000+ Chroma */
        box-shadow: 0 0 50px 33px #a00;
        background-color: #a00;
      }

    // Source - https://stackoverflow.com/a/53577159
    // Posted by Foxcode, modified by community. See post 'Timeline' for change history

    function stdev(array) {
      const n = array.length
      const mean = array.reduce((a, b) => a + b) / n
      return Math.sqrt(array.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / n)
    }
    
    async function createProperty(name) {
      const info = badges[name].split(" +");
      const chroma = parseInt(info[1].replaceAll(" ","")) || 10;
      let rarity = "common";
      if (chroma >= 10000000) {
        rarity = "mythic";
      } else if (chroma >= 1000) {
        rarity = ["uncommon", "rare", "epic", "legendary"][Math.floor(Math.log10(chroma))-3];
      }
      document.querySelector("#props").insertAdjacentHTML("afterbegin", `
        <div class="prop ${rarity}">
          <p class="large name">${name}</p>
          <p class="medium description">${info[0]}</p>
          <p class="small value ${rarity}">+${chroma} Chroma</p>
        </div>
      `);
      chrto += chroma;
      await sleep(Math.log10(chroma)*400);
    }
    
    async function analyzeNumber(type, rh, gs, bl, a) {
      const full=`${rh}${gs}${bl}${a=="-1"?"":a}`;
      const unique = new Set(full);
      await sleep(1000+Math.random()*1000);
      if (type === "hex") {
        const unique = new Set(full.split(""));
        const r = parseInt(rh, 16);
        const g = parseInt(gs, 16);
        const b = parseInt(bl, 16);
        const isNumber = c => /[0-9]/.test(c);
        const isLetter = c => /[a-f]/.test(c);
        const counts = {};
        const digits = full.split("");
        for (const d of digits) {
        	counts[d] = (counts[d] || 0) + 1;
        }
        const maxCount = Math.max(...Object.values(counts));
        const midtone = x => x >= 0x84 && x <= 0x8d;
        const a1z26 = x => x === "a1" || x === "b2" || x === "c3" || x === "d4" || x === "e5" || x === "f6";
        await createProperty("Hexadecimal");
        if ("02468ace".includes(rh[0])) {
        	await createProperty("Spotless");
        } else {
        	await createProperty("Bloody");
        }
        if (isNumber(digits[0]) && isNumber(digits[1])) await createProperty("Double Digit");
        if (isNumber(digits[4]) && isNumber(digits[5])) await createProperty("Double End Digit");
        if (isLetter(digits[0])) await createProperty("Letterous");
        if (unique.size === 6) await createProperty("Heterogeneous");
        if (r > g && r > b) await createProperty("Warm");
        if (g > r && g > b) await createProperty("Mossy");
        if (b > r && b > g) await createProperty("Cool");
        if (digits.slice(0, 3).every(isNumber)) await createProperty("Half Numbers");
        if (digits.slice(3, 6).every(isNumber)) await createProperty("Half End Numbers");
        if (digits.slice(0, 4).every(isNumber)) await createProperty("Suspicious");
        if (digits.slice(2, 6).every(isNumber)) await createProperty("Suspicious End");
        if (Object.values(counts).filter(c => c === 2).length === 1) await createProperty("Double Trouble");
        if (isLetter(digits[0]) && isLetter(digits[1])) await createProperty("Double Letter");
        if (isLetter(digits[4]) && isLetter(digits[5])) await createProperty("Double End Letter");
        if ([r, g, b].some(midtone)) await createProperty("Grounded");
        if (full.includes("a1") || full.includes("b2") || full.includes("c3") || full.includes("d4") || full.includes("e5") || full.includes("f6")) await createProperty("A1Z26");
        if (digits.slice(0, 5).every(isNumber)) await createProperty("So Close");
        if (digits.slice(1, 6).every(isNumber)) await createProperty("So Close End");
        if (rh[0] === rh[1]) await createProperty("Twin Reds");
        if (gs[0] === gs[1]) await createProperty("Twin Greens");
        if (bl[0] === bl[1]) await createProperty("Twin Blues");
        if (digits.every(isNumber)) await createProperty("RNGdle Roll");
        if (digits.slice(0, 3).every(isLetter)) await createProperty("Half Letters");
        if (digits.slice(3, 6).every(isLetter)) await createProperty("Half End Letters");
        if (unique.size === 4) await createProperty("Quartet");
        if (digits.filter(isLetter).length === 1) await createProperty("Firefly");
        if (isNumber(full[0]) && isNumber(full[2]) && isNumber(full[4]) && isLetter(full[1]) && isLetter(full[3]) && isLetter(full[5])) await createProperty("Alternator");
        if (isLetter(full[0]) && isLetter(full[2]) && isLetter(full[4]) && isNumber(full[1]) && isNumber(full[3]) && isNumber(full[5])) await createProperty("Alternator");
        if (a1z26(rh)) await createProperty("Red A1Z26");
        if (a1z26(gs)) await createProperty("Green A1Z26");
        if (a1z26(bl)) await createProperty("Blue A1Z26");
        if (digits.slice(0, 4).every(isLetter)) await createProperty("Very Suspicious");
        if (digits.slice(2, 6).every(isLetter)) await createProperty("Very Suspicious End");
        if (full.includes("14")) await createProperty("The Other Brainrot Reversed");

        if (full.includes("41")) await createProperty("The Other Brainrot");

        if (full.includes("96")) await createProperty("Reverse Nice");

        if (full.includes("af")) await createProperty("As Fuck");
        if (full.includes("b4")) await createProperty("Before");
        if (full.includes("bc")) await createProperty("Before Christ");
        if (full.includes("be")) await createProperty("That Is The Question");
        if (full.includes("bf")) await createProperty("Companionship");
        if (full.includes("cd")) await createProperty("Compact Disc");

        if (digits.slice(0, 5).every(isLetter)) await createProperty("Really Close");
        if (digits.slice(1, 6).every(isLetter)) await createProperty("Really Close End");
        if (unique.size === 3) await createProperty("Trinity");
        if (unique.size === 4 && maxCount === 2) await createProperty("Two Pair");
        if (digits.filter(isNumber).length === 1) await createProperty("Firefly+");
        if ([r, g, b].filter(midtone).length >= 2) await createProperty("Foundational");
        if (r === g) await createProperty("Yellow Submarine");
        if (g === b) await createProperty("My Oh My");
        if (r === b) await createProperty("Hot Pink");
        if (r >= 95 && r <= 130 && g >= 70 && g <= 100 && b <= 50) await createProperty("This Looks Like Shit!");

        if (full.includes("ace")) await createProperty("Asexual");
        if (full.includes("a55")) await createProperty("Watch Your Language");
        if (full.includes("cab")) await createProperty("Taxi!!! Taxi!!!");
        if (full.includes("e62")) await createProperty("Furry Slice (3)");
        if (full.includes("e92")) await createProperty("Safe Furry Slice (3)");
        if ([r, g, b].filter(a1z26).length >= 2) await createProperty("Double A1Z26");
        if (r < 20 && g < 20 && b < 20) await createProperty("Deep Void");

        if (unique.size === 2) await createProperty("Duality");

        if (digits.every(d => "08f".includes(d))) await createProperty("Ternary Soul");
        if (r === g && g === b) await createProperty("Greyscale");
        if (maxCount >= 5) await createProperty("Quintuple Trouble");
        if ([r, g, b].every(a1z26)) await createProperty("Triple A1Z26");
        if (digits.every(d => d === "0" || d === "f")) await createProperty("Binary Soul");
        if (full.includes("b00b5")) await createProperty("Rated X");
        if (unique.size === 1) await createProperty("Homogeneous");
        if (["bada55", "c0ffee", "deadbf", "b00b69"].includes(full)) await createProperty("Funny Hex");
        if (full === "663399") await createProperty("Rebecca's Blessing");
        if (full === "fafa00") await createProperty("What You Started With");
        await sleep(500+Math.random()*2500);
        const saturation = stdev([parseInt(rh, 16), parseInt(gs, 16), parseInt(bl, 16)]);
        const sp = Math.round(10000000/(1-(stdev([parseInt(rh, 16), parseInt(gs, 16), parseInt(bl, 16)])/147.3)**15)-9999990)
        let rarity = "common";
        if (sp >= 10000000) {
          rarity = "mythic";
        } else if (sp >= 1000) {
          rarity = ["uncommon", "rare", "epic", "legendary"][Math.floor(Math.log10(sp))-3];
        }
        document.querySelector("#props").insertAdjacentHTML("afterbegin", `
          <div class="prop ${rarity}">
            <p class="large name">Saturation of ${saturation.toFixed(3)}sp</p>
            <p class="medium description">Measured using the standard deviation of the channels.</p>
            <p class="small value ${rarity}">+${sp} Chroma</p>
          </div>
        `);
        chrto += sp;
        await sleep(1000);
        let brightness = [parseInt(rh, 16), parseInt(gs, 16), parseInt(bl, 16)].reduce((a, b) => a + b);
        if (brightness > 3333333) brightness = 3333333;
        rarity = "common";
        if (Math.round(3333323 * Math.abs((brightness - 382.5)/382.5) ** 8 + 10) >= 10000000) {
          rarity = "mythic";
        } else if (Math.round(3333323 * Math.abs((brightness - 382.5)/382.5) ** 8 + 10) >= 1000) {
          rarity = ["uncommon", "rare", "epic", "legendary"][Math.floor(Math.log10(Math.round(3333323 * Math.abs((brightness - 382.5)/382.5) ** 8 + 10)))-3];
        }
        document.querySelector("#props").insertAdjacentHTML("afterbegin", `
          <div class="prop ${rarity}">
            <p class="large name">Brightness of ${brightness}bp</p>
            <p class="medium description">Measured using the sum of the channels.</p>
            <p class="small value ${rarity}">+${Math.round(3333323 * Math.abs((brightness - 382.5)/382.5) ** 8 + 10)} Chroma</p>
          </div>
        `);
        chrto += Math.round(3333323 * Math.abs((brightness - 382.5)/382.5) ** 8 + 10);
        await sleep(800);
        return [saturation, brightness];
      } else if (type == "rgb") {
        const r = parseInt(rh, 16);
        const g = parseInt(gs, 16);
        const b = parseInt(bl, 16);
        await createProperty("RGB");
      }
    }
    
    function updateColor(txt) {
      document.querySelector("#color").style.backgroundColor = txt;
      document.querySelector("#color2").textContent = txt;
    }
    function update() {
      scale = parseFloat(document.querySelector("#color2").style.scale) || 1;
      document.querySelector("#color2").style.scale = `${scale + 0.1 * (1 - scale)}`;
      chr += 0.2 * (chrto - chr);
      document.querySelector("#chroma").textContent = `${Math.round(chr)} Chroma`;
      document.querySelector("#chroma").style.color = `hsl(${400/Math.PI*Math.atan(chrto/7575)}, 100%, 50%)`
      document.querySelector("#chroma").style.setProperty("--shake", `${3*Math.atan(chrto/33333)}px`);
      document.querySelector("#chroma").style.fontSize = `${1+3.5*Math.atan(chrto/70707)}em`;
    }
    async function roll() {
      chrto = 0;
      const hexregex = /#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})/gm;
      const rgbregex = /rgb\((\d{1,3}), (\d{1,3}), (\d{1,3})\)/gm;
      const hslregex = /hsl\((\d{1,3}), (\d{1,3})%, (\d{1,3})%\)/gm;
      const rgbaregex = /rgba\((\d{1,3}), (\d{1,3}), (\d{1,3}), ((?:0|1)\.(?:\d{3}))\)/gm;
      const hslaregex = /hsla\((\d{1,3}), (\d{1,3})%, (\d{1,3})%, ((?:0|1)\.(?:\d{3}))\)/gm;
      let saturation = 0;
      let brightness = 0;
      let color = 0.99//Math.random();
      let clist = [];
      if (color > 0.6) {
        color = "hex";
      } else if (color > 0.35) {
        color = "rgb";
      } else if (color > 0.15) {
        color = "hsl";
      } else if (color > 0.05) {
        color = "rgba";
      } else {
        color = "hsla";
      }
      if (color == "hex") {
        for (let i = 0; i < 6; i++) {
          for (let j = 0; j < 30 + 5 * clist.length; j++) {
            color = `#${clist.join("")}${window.crypto.randomUUID().slice(0,6-clist.length)}`;
            updateColor(color);
            await sleep(33 + 6 * clist.length);
          }
          clist.push(window.crypto.randomUUID().at(0));
          document.querySelector("#color2").style.scale = 2;
        }
        updateColor(color);
        const matches = hexregex.exec(color);
        const r = matches[1];
        const g = matches[2];
        const b = matches[3];
        [saturation, brightness] = await analyzeNumber("hex", r, g, b, "-1");
      } else if (color == "rgb") {
        for (let i = 0; i < 6; i++) {
          for (let j = 0; j < 30 + 5 * clist.length; j++) {
            color = `${clist.join("")}${window.crypto.randomUUID().slice(0,6-clist.length)}`;
            color = `rgb(${parseInt(color.slice(0,2), 16)}, ${parseInt(color.slice(2,4), 16)}, ${parseInt(color.slice(4), 16)})`;
            updateColor(color);
            await sleep(33 + 6 * clist.length);
          }
          clist.push(window.crypto.randomUUID().at(0));
          if (clist.length % 2 == 0) document.querySelector("#color2").style.scale = 2;
        }
      } else if (color == "hsl") {
        for (let i = 0; i < 7; i++) {
          for (let j = 0; j < 30 + 5 * clist.length; j++) {
            color = `${clist.join("")}${window.crypto.randomUUID().slice(0,7-clist.length)}`;
            color = `hsl(${Math.floor(parseInt(color.slice(0,3), 16)/4096*360)}, ${Math.floor(parseInt(color.slice(3,5), 16)/255*100)}%, ${Math.floor(parseInt(color.slice(5), 16)/255*100)}%)`;
            updateColor(color);
            await sleep(33 + 5 * clist.length);
          }
          clist.push(window.crypto.randomUUID().at(0));
          if ("357".includes(clist.length)) document.querySelector("#color2").style.scale = 2;
        }
      } else if (color == "rgba") {
        for (let i = 0; i < 8; i++) {
          for (let j = 0; j < 30 + 5 * clist.length; j++) {
            color = `${clist.join("")}${window.crypto.randomUUID().slice(0,8-clist.length)}`;
            color = `rgba(${parseInt(color.slice(0,2), 16)}, ${parseInt(color.slice(2,4), 16)}, ${parseInt(color.slice(4,6), 16)}, ${(parseInt(color.slice(6), 16)/255).toFixed(3)})`;
            updateColor(color);
            await sleep(33 + 4 * clist.length);
          }
          clist.push(window.crypto.randomUUID().at(0));
          if (clist.length % 2 == 0) document.querySelector("#color2").style.scale = 2;
        }
      } else {
        for (let i = 0; i < 9; i++) {
          for (let j = 0; j < 30 + 5 * clist.length; j++) {
            color = `${clist.join("")}${window.crypto.randomUUID().slice(0,9-clist.length)}`;
            color = `hsla(${Math.floor(parseInt(color.slice(0,3), 16)/4096*360)}, ${Math.floor(parseInt(color.slice(3,5), 16)/255*100)}%, ${Math.floor(parseInt(color.slice(5,7), 16)/255*100)}%, ${(parseInt(color.slice(7), 16)/255).toFixed(3)})`;
            updateColor(color);
            await sleep(33 + 5 * clist.length);
          }
          clist.push(window.crypto.randomUUID().at(0));
          if ("3579".includes(clist.length)) document.querySelector("#color2").style.scale = 2;
        }
      }
      let percentile = (200/Math.PI*Math.atan(chrto/6767)).toFixed(2);
      if (percentile <= 99) {
        percentile = String(Math.round(percentile));
      } else if (percentile <= 99.9) {
        percentile = Number(percentile).toFixed(1);
      }
      const ordinal = percentile.at(-2) == "1" ? "th" : percentile.endsWith("1") ? "st" : percentile.endsWith("2") ? "nd" : percentile.endsWith("3") ? "rd" : "th";
      document.querySelector("#stats").insertAdjacentHTML("beforeend", `
        <p class="large mono" id="percentile" style="animation: appear 0.5s; font-size: 2em; color: hsl(${240/Math.PI*Math.atan(chrto/6767)}, 100%, 50%)">${percentile}${ordinal} percentile</p>
      `);
      await sleep(556);
      document.querySelector("#stats").insertAdjacentHTML("beforeend", `
        <button class="large mono" id="share" style="animation: appear 0.5s; font-size: 1rem;" onclick="navigator.clipboard.writeText('Creulette 🟨 ${color}\\n${percentile}${ordinal} percentile, ${chrto} Chroma\\n${saturation.toFixed(3)}sp, ${brightness.toFixed(0)}bp\\nhttps://prototypestudios.neocities.org/creulette')">SHARE YOUR ROLL</p>
      `);
      await sleep(556);
      document.querySelector("#stats").insertAdjacentHTML("beforeend", `
        <button class="large mono" id="roll2" style="animation: appear 0.5s; font-size: 1rem;" onclick="document.querySelector('#percentile').remove(); document.querySelector('#share').remove(); document.querySelector('#props').innerHTML = ''; this.remove(); roll();">ROLL AGAIN</p>
      `);
    }
    setInterval(update, 16);
    let chrto = 0;
    let chr = 0;
    document.querySelector("#roll").onclick = async () => {
      document.querySelector("#roll").remove();
      await roll();
    }
  </script>
</html>
