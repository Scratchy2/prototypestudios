    function stdev(array) {
      const n = array.length;
      const mean = array.reduce((a, b) => a + b) / n;
      return Math.sqrt(array.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / n);
    }
    
    async function createProperty(name) {
      const info = badges[name].split(" +");
      const chroma = parseInt(info[1].replaceAll(" ","")) || 10;
      let rarity = "common";
      if (chroma >= 1000000) {
        rarity = "mythic";
      } else {
        rarity = ["common", "uncommon", "rare", "epic", "legendary", "mythic", "mythic"][Math.floor(Math.log10(chroma))-1];
      }
      document.querySelector("#props").insertAdjacentHTML("afterbegin", `
        <div class="prop ${rarity}">
          <p class="large name">${name}</p>
          <p class="medium description">${info[0]}</p>
          <p class="small value ${rarity}">+${chroma} Chroma</p>
        </div>
      `);
      chrto += chroma;
      shake = 1;
      if (rareCount == 2) {A2rare.play(); shake = 2;}
      if (rareCount == 3) {A3rare.play(); shake = 4;}
      if (rareCount == 4) {A4rare.play(); shake = 6;}
      if (rareCount > 4) {A5rare.play(); shake = 8;}
      if (rarity == "common") {Acommon.playbackRate = 1+0.05*badgeCount; badgeCount += 1; Acommon.play(); shake *= 1.5;}
      if (rarity == "uncommon") {Auncommon.playbackRate = 1+0.05*badgeCount; badgeCount += 1; Auncommon.play(); shake *= 2.5;}
      if (rarity == "rare") {Arare.playbackRate = 1+0.025*rareCount; rareCount += 1; Arare.play(); shake *= 4.5;}
      if (rarity == "epic") {Aepic.playbackRate = 1+0.025*rareCount; rareCount += 1; Aepic.play(); shake *= 6.5;}
      if (rarity == "legendary") {Alegendary.playbackRate = 1+0.025*rareCount; rareCount += 1; Alegendary.play(); shake *= 10.5;}
      if (rarity == "mythic") {Amythic.playbackRate = 1+0.025*rareCount; rareCount += 1; Amythic.play(); shake *= 15.5;}
      await sleep(500+Math.log10(chroma)*337);
    }
    
    async function analyzeNumber(type, rh, gs, bl, a) {
      const full=`${rh}${gs}${bl}${a=="-1"?"":a}`;
      const unique = new Set(full);
      document.querySelector("#color").classList.add("sizeup");
      document.querySelector("#color2").style.rotate = `0deg`;
      await sleep(1000+Math.random()*1000);
      if (type === "hex") {
        const unique = new Set(full.split(""));
        const r = parseInt(rh, 16);
        const g = parseInt(gs, 16);
        const b = parseInt(bl, 16);
        const isNumber = c => /[0-9]/.test(c);
        const isLetter = c => /[a-f]/.test(c);
        const counts = {};
        const digits = full.split("");
        for (const d of digits) {

      if (orangesq < minimum) {square = "🟧"; minimum = orangesq;}
      if (yellowsq < minimum) {square = "🟨"; minimum = yellowsq;}
      if (greensq < minimum) {square = "🟩"; minimum = greensq;}
      if (bluesq < minimum) {square = "🟦"; minimum = bluesq;}
      if (purplesq < minimum) {square = "🟪"; minimum = purplesq;}
      if (brownsq < minimum) {square = "🟫"; minimum = brownsq;}
      if (blacksq < minimum) {square = "⬛"; minimum = blacksq;}
      if (whitesq < minimum) {square = "⬜"; minimum = whitesq;}
      document.querySelector("#stats").insertAdjacentHTML("beforeend", `
        <button class="large mono sizeup2" id="share" style="font-size: 1rem;" onclick="navigator.clipboard.writeText('Creulette ${square} ${color}\\n${percentile}${ordinal} percentile, ${chrto} Chroma\\n${saturation.toFixed(3)}sp, ${beauty.toFixed(3)}ap, ${brightness.toFixed(0)}bp\\nhttps://prototypestudios.neocities.org/creulette?color=${color.replace(/[^0-9a-f,]/gi, "")}&type=${type}')">SHARE YOUR ROLL</p>
      `);
      await sleep(556);
      document.querySelector("#stats").insertAdjacentHTML("beforeend", `
        <button class="large mono sizeup2" id="roll2" style="font-size: 1rem;" onclick="document.querySelector('#percentile').remove(); document.querySelector('#share').remove(); document.querySelector('#props').innerHTML = ''; document.querySelector('#color').classList.remove('sizeup'); badgeCount = 0; rareCount = 0; this.remove(); roll();">ROLL AGAIN</p>
      `);
    }
    setInterval(update, 16);
    let chrto = 0;
    let chr = 0;
    let shake = 0;
    window.onload = async () => {
      const color = new URLSearchParams(document.location.search).get("color");
      const type = new URLSearchParams(document.location.search).get("type");
      if (color) {
        if (type=="hex") {
          document.querySelector("#roll").remove();
          document.querySelector("h6").textContent = "User-shared roll";
          document.querySelector(".back").textContent = "← Back to Creulette";
          document.querySelector("#color").style.backgroundColor = `#${color}`;
          document.querySelector("#color2").textContent = `#${color}`;
          await analyzeNumber("hex", color.slice(0,2), color.slice(2,4), color.slice(4,6), "-1");
        }
      }
    }
    document.querySelector("#roll").onclick = async () => {
      document.querySelector("#roll").remove();
      await roll();
    }
    document.querySelector(".back").onclick = () => {
      if (document.querySelector(".back").textContent.includes("ProtoType")) {
        window.location.href = "https://prototypestudios.neocities.org";
      } else {
        window.location.href = "https://prototypestudios.neocities.org/creulette";
      }
    }
  </script>
